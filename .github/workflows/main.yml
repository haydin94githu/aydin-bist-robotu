name: Aydin BIST Robotu

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bist-robot:
    runs-on: ubuntu-latest
    steps:
      - name: Repo dosyalarını al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Paketleri yükle
        run: |
          pip install yfinance pandas numpy openpyxl requests nbconvert notebook ipykernel tradingview-screener

      - name: Notebook çalıştır
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          jupyter nbconvert --to notebook --execute "bist_robot.ipynb" --output "sonuc.ipynb"
         

    - name: Sanal portfoyu kaydet
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if [ -f sanal_portfoy.json ]; then
            git add sanal_portfoy.json
            git commit -m "Sanal portfoy guncellendi" || echo "Degisiklik yok"
            git push || echo "Push yapilamadi"
          else
            echo "sanal_portfoy.json bulunamadi, kayit atlanıyor"
          fi
